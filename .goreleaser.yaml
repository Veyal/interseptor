version: 2

project_name: interseptor

builds:
  - id: interseptor
    main: ./cmd/interseptor
    binary: interseptor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Veyal
    # NOTE: still the pre-rebrand repo name — the GitHub repository itself has
    # not been renamed yet (a coordinated, non-code step; see internal/version/
    # version.go's Repo constant). Flip this to "interseptor" once it is.
    name: interceptor
  draft: false
  prerelease: false
