version: 2

project_name: interseptor

builds:
  - id: interseptor
    main: ./cmd/interseptor
    binary: interseptor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
  # Same binary under the pre-rename name so legacy `interceptor update`
  # self-updaters can extract it from interceptor_* archives.
  - id: interceptor-legacy
    main: ./cmd/interseptor
    binary: interceptor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    ids: [interseptor]
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
  - id: legacy
    ids: [interceptor-legacy]
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "interceptor_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Veyal
    name: interseptor
  draft: false
  prerelease: false

# Package-manager publishing — uncomment and point at a tap/bucket repo to enable
# `brew install Veyal/tap/interseptor` and `scoop install interseptor`. See
# packaging/README.md. Disabled by default so a release never fails on a missing
# tap repo.
